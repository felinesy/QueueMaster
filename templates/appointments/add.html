<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:Segoe UI;
}

.sidebar{
width:220px;
height:100vh;
position:fixed;
background:#10b981;
padding:20px;
color:white;
}

.sidebar h2{
font-weight:bold;
margin-bottom:25px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:8px;
border-radius:10px;
}

.sidebar a:hover{
background:white;
color:#10b981;
}

.content{
margin-left:240px;
padding:30px;
}

.card{
border:none;
border-radius:18px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.btn-success{
background:#10b981;
border:none;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>QueueMaster</h2>

<hr>

<a href="/dashboard/">Dashboard</a>

<a href="/customers/">Customers</a>

<a href="/dashboard/services/">Services</a>

<a href="/dashboard/appointments/">Appointments</a>

<a href="/logout/">Logout</a>

</div>

<div class="content">

<div class="card">

<div class="card-body">

<h2 class="fw-bold mb-3">
Add Appointment
</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-success">
Save Appointment
</button>

<a href="/dashboard/appointments/" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

</body>

</html>
