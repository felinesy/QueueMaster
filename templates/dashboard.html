<!DOCTYPE html>
<html>

<head>

<title>QueueMaster Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.sidebar{
width:250px;
height:100vh;
background:#10b981;
position:fixed;
color:white;
padding:20px;
}

.sidebar a{
display:block;
padding:12px;
text-decoration:none;
color:white;
border-radius:10px;
margin-bottom:5px;
}

.sidebar a:hover{
background:white;
color:#10b981;
}

.content{
margin-left:270px;
padding:30px;
}

.card{
border:none;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>
QueueMaster
</h3>

<hr>

<a href="#">
<i class="bi bi-speedometer2"></i>
Dashboard
</a>

<a href="#">
<i class="bi bi-people"></i>
Customers
</a>

<a href="#">
<i class="bi bi-calendar-check"></i>
Appointments
</a>

<a href="#">
<i class="bi bi-list-task"></i>
Queue
</a>

<a href="/logout/">
<i class="bi bi-box-arrow-right"></i>
Logout
</a>

</div>

<div class="content">

<h2>
Welcome,
{{ request.user.first_name }}
</h2>

<br>

<div class="row">

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Total Customers</h5>

<h2>20</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Waiting</h5>

<h2>8</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Appointments</h5>

<h2>15</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card">

<div class="card-body">

<h5>Completed</h5>

<h2>12</h2>

</div>

</div>

</div>

</div>

<br>

<div class="card">

<div class="card-header">
Recent Queue Requests
</div>

<div class="card-body">

<table class="table">

<thead>

<tr>

<th>Customer</th>

<th>Queue</th>

<th>Status</th>

</tr>

</thead>

<tbody>

<tr>

<td>Juan Dela Cruz</td>

<td>Q001</td>

<td>
<span class="badge bg-success">
Waiting
</span>
</td>

</tr>

<tr>

<td>Maria Santos</td>

<td>Q002</td>

<td>
<span class="badge bg-primary">
Serving
</span>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
