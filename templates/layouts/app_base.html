<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}QueueMaster{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
    font-family:Segoe UI, sans-serif;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#10b981;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h3{
    font-weight:bold;
}

.sidebar a{
    display:block;
    padding:12px;
    text-decoration:none;
    color:white;
    border-radius:10px;
    margin-bottom:6px;
    transition:.2s;
}

.sidebar a:hover,
.sidebar a.active{
    background:white;
    color:#10b981;
}

.content{
    margin-left:270px;
    padding:30px;
}

.card{
    border:none;
    border-radius:18px;
    box-shadow:0 12px 25px rgba(0,0,0,.08);
}

.btn-success{
    background:#10b981;
    border:none;
}

.btn-success:hover{
    background:#059669;
}

</style>

{% block extra_head %}{% endblock %}

</head>

<body>

{% include "partials/sidebar.html" %}

<div class="content">

{% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Toast container for realtime notifications -->
<div aria-live="polite" aria-atomic="true" class="position-fixed top-0 end-0 p-3" style="z-index: 1080;">
  <div id="toast-container"></div>
</div>

<script>
// Poll the server for unread notifications and show them as Bootstrap toasts
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

async function fetchNotifications() {
    try {
            const res = await fetch('/notifications/unread/');
        if (!res.ok) return;
        const data = await res.json();
        if (!data.notifications || data.notifications.length === 0) return;

        const ids = [];
        for (const n of data.notifications) {
            ids.push(n.id);
            showToast(n.message, n.level || 'info');
        }

        // mark read
            await fetch('/notifications/mark-read/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: new URLSearchParams({ 'ids[]': ids }),
        });

    } catch (e) {
        // ignore network errors
        console.error('Notification fetch failed', e);
    }
}

function showToast(message, level) {
    const container = document.getElementById('toast-container');
    const toastEl = document.createElement('div');
    toastEl.className = 'toast align-items-center text-bg-light border-0';
    toastEl.setAttribute('role','alert');
    toastEl.setAttribute('aria-live','assertive');
    toastEl.setAttribute('aria-atomic','true');
    toastEl.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">
                ${escapeHtml(message)}
            </div>
            <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    `;
    container.appendChild(toastEl);
    const bsToast = new bootstrap.Toast(toastEl, { delay: 8000 });
    bsToast.show();
    // remove element after hidden
    toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
}

function escapeHtml(unsafe) {
    return unsafe
         .replace(/&/g, '&amp;')
         .replace(/</g, '&lt;')
         .replace(/>/g, '&gt;')
         .replace(/"/g, '&quot;')
         .replace(/'/g, '&#039;');
}

// Start polling every 5 seconds
setInterval(fetchNotifications, 5000);
// Also fetch once on load
fetchNotifications();
</script>

</body>

</html>
