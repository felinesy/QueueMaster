<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}QueueMaster{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    background:linear-gradient(135deg,#10b981,#0f766e);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Segoe UI, sans-serif;
    margin:0;
}

.auth-card{
    width:100%;
    max-width:500px;
    border:none;
    border-radius:20px;
    padding:35px;
    background:rgba(255,255,255,.95);
    box-shadow:0 20px 45px rgba(0,0,0,.2);
}

.auth-logo{
    width:90px;
    height:90px;
    background:#10b981;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:42px;
    margin:auto;
    margin-bottom:20px;
}

.btn-success{
    background:#10b981;
    border:none;
}

.btn-success:hover{
    background:#059669;
}

</style>

{% block extra_head %}{% endblock %}

</head>

<body>

<div class="auth-card">

{% block content %}{% endblock %}

</div>

</body>

</html>
