<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>QueueMaster | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:linear-gradient(135deg,#10b981,#0f766e);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI;
        }

        .login-card{
            width:420px;
            border:none;
            border-radius:20px;
            padding:35px;
            background:rgba(255,255,255,.95);
            box-shadow:0 20px 45px rgba(0,0,0,.2);
        }

        .logo{
            width:90px;
            height:90px;
            background:#10b981;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:42px;
            margin:auto;
            margin-bottom:20px;
        }

        .btn-success{
            background:#10b981;
            border:none;
        }

        .btn-success:hover{
            background:#059669;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        <i class="bi bi-person-lines-fill"></i>
    </div>

    <h2 class="text-center fw-bold">
        QueueMaster
    </h2>

    <p class="text-center text-muted">
        Sign in to continue
    </p>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-warning">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>
        </div>

        <div class="d-flex justify-content-between mb-3">

            <div>
                <input type="checkbox">
                Remember Me
            </div>

            <a href="#">
                Forgot Password?
            </a>

        </div>

        <button class="btn btn-success w-100">
            Login
        </button>

    </form>

    <hr>

    <div class="text-center">
        Don't have an account?

        <a href="/register/">
            Register Here
        </a>

    </div>

</div>

</body>
</html>
