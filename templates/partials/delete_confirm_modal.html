<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <div>
                    <div class="text-danger fw-semibold text-uppercase small mb-1">Confirm deletion</div>
                    <h5 class="modal-title fw-bold" id="deleteConfirmTitle">Delete this record?</h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body py-3">
                <p class="mb-0 text-muted" id="deleteConfirmText">This action cannot be undone. Are you sure you want to continue?</p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <a href="#" id="deleteConfirmAction" class="btn btn-danger">Yes, delete</a>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const modal = document.getElementById('deleteConfirmModal');
    if (!modal) return;

    const title = document.getElementById('deleteConfirmTitle');
    const text = document.getElementById('deleteConfirmText');
    const action = document.getElementById('deleteConfirmAction');

    document.querySelectorAll('.js-delete-confirm-btn').forEach(function (button) {
        button.addEventListener('click', function () {
            const label = button.getAttribute('data-label') || 'this record';
            const url = button.getAttribute('data-url');
            title.textContent = 'Delete ' + label + '?';
            text.textContent = 'This will permanently remove ' + label + '. Are you sure you want to continue?';
            action.setAttribute('href', url);
            const modalInstance = new bootstrap.Modal(modal);
            modalInstance.show();
        });
    });
});
</script>
