<!DOCTYPE html>
<html>

<head>

    <title>QueueMaster | Add Service</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            background:#f5f7fb;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            background:#10b981;
            padding:20px;
            color:white;
        }

        .sidebar h3{
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            padding:12px;
            color:white;
            text-decoration:none;
            border-radius:10px;
            margin-bottom:6px;
        }

        .sidebar a:hover,
        .sidebar a.active{
            background:white;
            color:#10b981;
        }

        .content{
            margin-left:270px;
            padding:35px;
        }

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 12px 25px rgba(0,0,0,.08);
        }

        .btn-success{
            background:#10b981;
            border:none;
        }

        .btn-success:hover{
            background:#059669;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h3>QueueMaster</h3>

    <hr>

    <a href="{% url 'dashboard' %}">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="{% url 'customer_list' %}">
        <i class="bi bi-people"></i>
        Customers
    </a>

    <a href="{% url 'staff_list' %}">
        <i class="bi bi-person-badge"></i>
        Staff
    </a>

    <a class="active" href="{% url 'service_list' %}">
        <i class="bi bi-scissors"></i>
        Services
    </a>

    <a href="{% url 'appointment_list' %}">
        <i class="bi bi-calendar-check"></i>
        Appointments
    </a>

    <a href="{% url 'logout' %}">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<div class="content">

    <div class="card">

        <div class="card-body">

            <h2 class="mb-4">
                Add Service
            </h2>

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-check-circle"></i>
                    Save Service
                </button>

                <a href="{% url 'service_list' %}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
