<!DOCTYPE html>
<html>

<head>

<title>QueueMaster | Staff Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
}

.sidebar{
    width:250px;
    height:100vh;
    background:#10b981;
    position:fixed;
    padding:20px;
    color:white;
}

.sidebar h3{
    font-weight:bold;
}

.sidebar a{
    display:block;
    padding:12px;
    text-decoration:none;
    color:white;
    border-radius:10px;
    margin-bottom:5px;
}

.sidebar a:hover,
.sidebar .active{
    background:white;
    color:#10b981;
}

.content{
    margin-left:270px;
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="sidebar">

<h3>QueueMaster</h3>

<hr>

<a href="{% url 'dashboard' %}">
    <i class="bi bi-speedometer2"></i>
    Dashboard
</a>

<a href="{% url 'customer_list' %}">
    <i class="bi bi-people"></i>
    Customers
</a>

<a href="{% url 'staff_list' %}" class="active">
    <i class="bi bi-person-badge"></i>
    Staff
</a>

<a href="{% url 'service_list' %}">
    <i class="bi bi-scissors"></i>
    Services
</a>

<a href="{% url 'appointment_list' %}">
    <i class="bi bi-calendar-check"></i>
    Appointments
</a>

<a href="{% url 'logout' %}">
    <i class="bi bi-box-arrow-right"></i>
    Logout
</a>

</div>

<div class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>

<h2>Staff Management</h2>

<p class="text-muted">
Manage salon staff.
</p>

</div>

<a href="{% url 'staff_add' %}" class="btn btn-success">

<i class="bi bi-plus-circle"></i>

Add Staff

</a>

</div>

<div class="card">

<div class="card-body">

<table class="table table-hover">

<thead class="table-success">

<tr>

<th>ID</th>
<th>Full Name</th>
<th>Position</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for staff in staffs %}

<tr>

<td>{{ staff.id }}</td>

<td>{{ staff.user.full_name }}</td>

<td>{{ staff.position }}</td>

<td>

<a href="#" class="btn btn-primary btn-sm">

<i class="bi bi-pencil"></i>

</a>

<a href="{% url 'staff_delete' staff.pk %}" class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="4" class="text-center py-5">

No staff found.

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>
